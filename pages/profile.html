<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResourceX - User Profile</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/layout.css">
    <link rel="stylesheet" href="../css/components/button.css">
    <link rel="stylesheet" href="../css/components/card.css">
    <link rel="stylesheet" href="../css/components/form.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1e40af 100%);
            padding: 3rem 2rem;
            color: white;
            text-align: center;
        }
        .profile-avatar-large {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 4px solid white;
            margin: 0 auto 1rem;
            overflow: hidden;
            background: white;
        }
        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-body {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .form-group input[type="text"], .form-group input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }
        .form-group input[disabled] {
            background-color: #f1f5f9;
            color: #64748b;
            cursor: not-allowed;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-row:last-child {
            border-bottom: none;
        }
        .setting-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1rem;
        }
        .setting-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Sidebar placeholder -->
        <app-sidebar></app-sidebar>

        <div class="main-wrapper">
            <app-header></app-header>

            <main class="content-area">
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar-large">
                            <img id="pageProfileAvatar" src="https://ui-avatars.com/api/?name=User&background=fff&color=0f38ae" alt="Avatar">
                        </div>
                        <h1 style="margin:0; font-size:1.5rem;" id="pageProfileName">User Name</h1>
                        <p style="margin:0.25rem 0 0; opacity:0.8;" id="pageProfileRole">Role</p>
                    </div>

                    <div class="profile-body">
                        <h2 style="margin-top:0; border-bottom:2px solid var(--border-color); padding-bottom:0.5rem;">Account Information</h2>
                        
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-top:1.5rem;">
                            <div class="form-group">
                                <label>User ID</label>
                                <input type="text" id="inputUserId" disabled>
                            </div>
                            <div class="form-group">
                                <label>Department</label>
                                <input type="text" id="inputUserDept" disabled>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Full Name</label>
                            <div style="display:flex; gap:0.5rem;">
                                <input type="text" id="inputUserName" disabled oninput="clearNameError()">
                                <button class="btn-secondary" style="padding: 0 1rem;" onclick="enableNameEdit()" type="button">Edit</button>
                            </div>
                            <div id="nameError" style="color: #ef4444; font-size: 0.8rem; font-weight: 500; display: none; margin-top: 0.4rem;">Please enter a valid name (characters only).</div>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="inputUserEmail" disabled>
                        </div>

                        <div style="margin-top:2rem;">
                            <h2 style="border-bottom:2px solid var(--border-color); padding-bottom:0.5rem;">Preferences & Settings</h2>
                            
                            <div class="setting-row">
                                <div class="setting-info">
                                    <h3>Push Notifications</h3>
                                    <p>Receive alerts for approvals, maintenance, and updates.</p>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="toggleNotifications" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>


                        </div>

                        <div style="margin-top: 2.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                            <button class="btn-secondary" onclick="window.history.back()">Back To Dashboard</button>
                            <button class="btn-primary" onclick="saveProfileChanges()">Save Changes</button>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils/store.js"></script>
    <script src="../js/components/app-header.js"></script>
    <!-- Basic sidebar dummy to prevent errors -->
    <script>
        class DummySidebar extends HTMLElement {
            connectedCallback() {
                this.innerHTML = `
                <div class="sidebar" style="width: 260px; background: white; border-right: 1px solid var(--border-color); padding: 1.5rem; display: flex; flex-direction: column;">
                    <div style="display:flex; align-items:center; gap:0.75rem; padding: 0 1rem 2rem;">
                        <div style="width:32px; height:32px; background:var(--primary-color); border-radius:6px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">RX</div>
                        <div style="font-weight:700; font-size:1.25rem; color:var(--primary-color);">ResourceX</div>
                    </div>
                    <ul style="list-style:none; padding:0; margin:0; flex:1;">
                        <li style="padding:0.75rem 1.5rem; cursor:pointer; color:var(--text-muted); font-weight:500;" onclick="window.history.back()">
                            <span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 0.5rem;">arrow_back</span> Return to App
                        </li>
                    </ul>
                </div>`;
            }
        }
        customElements.define('app-sidebar', DummySidebar);

        function loadProfileData() {
            const user = Store.getCurrentUser();
            if(!user) {
                // Not strictly enforcing redirect so it works if opened locally without state setup for testing
                // window.location.href = 'login.html';
                // return;
            }

            const activeUser = user || { id: 'U-999', name: 'Demo User', role: 'Staff', department: 'Demo Dept', email: 'demo@resourcex.com' };

            document.getElementById('pageProfileName').innerText = activeUser.name;
            document.getElementById('pageProfileRole').innerText = activeUser.role;
            document.getElementById('pageProfileAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(activeUser.name)}&background=fff&color=0f38ae`;

            document.getElementById('inputUserId').value = activeUser.id;
            document.getElementById('inputUserDept').value = activeUser.department;
            document.getElementById('inputUserName').value = activeUser.name;
            document.getElementById('inputUserEmail').value = activeUser.email;
            
            // Load local prefs
            const prefs = JSON.parse(localStorage.getItem('rx_prefs') || '{"notifications": true}');
            document.getElementById('toggleNotifications').checked = prefs.notifications;
        }

        function clearNameError() {
            const errorDiv = document.getElementById('nameError');
            if (errorDiv) {
                errorDiv.style.display = 'none';
                document.getElementById('inputUserName').style.borderColor = 'var(--border-color)';
            }
        }

        function saveProfileChanges() {
            const user = Store.getCurrentUser();
            if(!user) return;

            const nameInput = document.getElementById('inputUserName');
            const newName = nameInput.value.trim();
            const errorDiv = document.getElementById('nameError');

            // Validate name (only letters, numbers, spaces, dots, hyphens)
            const nameRegex = /^[a-zA-Z0-9\s.-]+$/;
            if (!newName) {
                errorDiv.innerText = 'Name is required.';
                errorDiv.style.display = 'block';
                nameInput.style.borderColor = '#ef4444';
                nameInput.focus();
                return;
            } else if (!nameRegex.test(newName)) {
                errorDiv.innerText = 'Name can only contain characters and numbers.';
                errorDiv.style.display = 'block';
                nameInput.style.borderColor = '#ef4444';
                nameInput.focus();
                return;
            } else {
                clearNameError();
            }

            // Update user in data array and currentUser
            const data = Store.getData();
            
            const userIndex = data.users.findIndex(u => u.id === user.id);
            if(userIndex > -1) {
                data.users[userIndex].name = newName;
            }
            data.currentUser.name = newName;
            
            Store.saveData(data);

            // Save Prefs
            const prefs = {
                notifications: document.getElementById('toggleNotifications').checked
            };
            localStorage.setItem('rx_prefs', JSON.stringify(prefs));

            // Show Toast
            Store.showToast("Profile Settings Saved Successfully");
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        }

        function enableNameEdit() {
            const input = document.getElementById('inputUserName');
            input.disabled = false;
            input.focus();
        }

        window.addEventListener('DOMContentLoaded', loadProfileData);
    </script>
</body>
</html>
